<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>JS Tasks</title>
</head>
<body>

    <!-- 1) p ელემენტი -->
    <p id="myParagraph">ძველი ტექსტი</p>

    <!-- 2) h1 + ღილაკი -->
    <h1 id="myTitle">სათაური</h1>
    <button onclick="changeColor()">შეცვალე ფერი</button>

    <!-- 3) div -->
    <div id="myDiv" style="width:200px; height:100px; background-color:gray; margin-top:10px;">
        DIV
    </div>
    <button onclick="changeBackground()">შეცვალე background</button>

    <!-- 4) p + ღილაკი -->
    <p id="resizeText">ეს ტექსტი გაიზრდება</p>
    <button onclick="increaseFont()">გაზარდე ტექსტი</button>

    <!-- 5) class ელემენტები -->
    <p class="myClass">პირველი</p>
    <p class="myClass">მეორე</p>
    <p class="myClass">მესამე</p>
    <button onclick="changeClassText()">შეცვალე ერთ-ერთი</button>

    <script src="1.js"></script>
</body>
</html>
